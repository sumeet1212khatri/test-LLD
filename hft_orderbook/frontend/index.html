<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFT Order Book Engine</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080c10; --bg2:#0d1117; --border:#1e2d3d; --green:#00ff88; --cyan:#00e5ff; --text:#e2e8f0; --text2:#8899aa; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; margin:0; padding:32px; }
  .panel { background: var(--bg2); border: 1px solid var(--border); padding: 24px; border-radius: 8px; margin-bottom: 24px; }
  .panel-title { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text2); letter-spacing: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  input, select { background: var(--bg); border: 1px solid var(--border); color: var(--green); padding: 8px 12px; font-family: 'JetBrains Mono'; border-radius: 4px; width: 100%; box-sizing: border-box; }
  button { cursor: pointer; background: linear-gradient(135deg, var(--green), var(--cyan)); color: #000; font-weight: bold; border:none; padding: 10px 24px; border-radius: 4px; font-family: 'JetBrains Mono'; text-transform: uppercase; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  pre { background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 13px; color: var(--cyan); white-space: pre-wrap; overflow-x: auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .kpi { background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 8px; text-align: left; border-left: 3px solid var(--green); }
  .kpi span { display: block; font-size: 10px; color: var(--text2); margin-bottom: 8px; font-family: 'JetBrains Mono'; letter-spacing: 1px; }
  .kpi strong { font-size: 24px; font-family: 'JetBrains Mono'; color: var(--text); }
</style>
</head>
<body>

<h2>⚡ HFT Order Book Engine</h2>
<p style="color: var(--text2); margin-bottom: 32px;">C++20 matching engine execution live from the backend.</p>

<div class="panel">
  <div class="panel-title">BENCHMARK CONFIGURATION</div>
  <div class="grid">
    <div><label style="font-size:12px; color:var(--text2);">Total Orders</label><select id="cfg-orders"><option value="1000000">1M</option><option value="5000000">5M</option><option value="20000000" selected>20M</option></select></div>
    <div><label style="font-size:12px; color:var(--text2);">Cancel Ratio</label><input type="number" id="cfg-cancel" value="0.20" step="0.05"></div>
    <div><label style="font-size:12px; color:var(--text2);">Market Ratio</label><input type="number" id="cfg-market" value="0.10" step="0.05"></div>
  </div>
  <button id="run-btn" onclick="runBenchmark()">Execute Engine</button>
  <span id="status" style="margin-left:16px; font-family:'JetBrains Mono'; font-size:12px; color:var(--green);"></span>
</div>

<div class="panel" id="results" style="display:none;">
  <div class="panel-title">REAL-TIME RESULTS</div>
  <div class="grid" id="kpi-grid"></div>
  <div class="panel-title" style="margin-top: 24px;">C++ JSON OUTPUT</div>
  <pre id="json-output"></pre>
</div>

<script>
async function runBenchmark() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');
  const orders = document.getElementById('cfg-orders').value;
  const cancel = document.getElementById('cfg-cancel').value;
  const market = document.getElementById('cfg-market').value;

  btn.disabled = true;
  status.innerText = "Executing binary on server... Please wait.";
  status.style.color = "var(--text2)";
  document.getElementById('results').style.display = 'none';

  try {
    const res = await fetch(`/api/benchmark?orders=${orders}&cancel=${cancel}&market=${market}`);
    const data = await res.json();
    
    if(data.error) {
        status.innerText = "Execution Error: " + data.error;
        status.style.color = "var(--red)";
        btn.disabled = false;
        return;
    }

    document.getElementById('json-output').innerText = JSON.stringify(data, null, 2);
    
    const kpis = [
      { label: "THROUGHPUT (OPS/SEC)", val: data.ordersPerSecond.toLocaleString(undefined, {maximumFractionDigits: 0}) },
      { label: "TRADE RATE (TRADES/SEC)", val: data.tradesPerSecond.toLocaleString(undefined, {maximumFractionDigits: 0}) },
      { label: "WALL TIME", val: data.wallTimeSeconds.toFixed(2) + "s" },
      { label: "ORDERS PROCESSED", val: data.totalOrders.toLocaleString() },
      { label: "P50 LATENCY", val: data.latency.p50Ns + " ns" },
      { label: "P99 LATENCY", val: data.latency.p99Ns + " ns" }
    ];

    document.getElementById('kpi-grid').innerHTML = kpis.map(k => 
      `<div class="kpi"><span>${k.label}</span><strong>${k.val}</strong></div>`
    ).join('');

    status.innerText = "✓ Execution Complete";
    status.style.color = "var(--green)";
    document.getElementById('results').style.display = 'block';
  } catch (err) {
    status.innerText = "Network or server failure.";
    status.style.color = "var(--red)";
  }
  btn.disabled = false;
}
</script>
</body>
</html>
